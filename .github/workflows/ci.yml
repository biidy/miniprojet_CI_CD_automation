name: MLRun CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-model:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run ML pipeline
      run: |
        python pipeline/pipeline.py

    - name: Check generated artifacts
      run: |
        ls -R  # Cela va lister tous les fichiers créés, y compris ton model.pkl

    - name: Upload Model Artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model # Le nom du pack qu' on va télécharger
        path: artifacts/train-function-train-model/0/advertising_model/model.pkl